# SDLC Tracking Configuration - Central Source of Truth
# This is the standardized template for all projects in the PME portfolio
# Version: 1.2.0
# Auto-generated by: /track-sdlc [project-id] init
#
# Tool keys below (external_refs / external_sync: jira, linear, notion, confluence, github, ...)
# are an ILLUSTRATIVE multi-tool catalog — they are NOT canonical instructions to use a given tool.
# Tools resolve via the central registry `_shared/lidr/integrations/tool-registry.yaml`; the active
# client binds its concrete tracker/docs/VCS in `clients/<CODE>.yaml`. Keep only the bound tools' keys.
# Do not change the state-file schema/semantics — these keys are the data structure this skill owns.

project:
  id: "PROJ-2026-{NNN}" # Format: PROJ-YYYY-NNN
  name: "Project Name" # Human-readable project name
  type: "Enhancement" # Enhancement | New Feature | Bug Fix | Technical Debt | Infrastructure
  domain: "{{DOMAIN}}" # Project domain — bound per client (e.g. Identity Verification | Payments | Health Records | Platform Core | Security)
  description: "Brief project description (1-2 sentences)"

portfolio:
  pme_priority: "P1" # P1 (Critical) | P2 (High) | P3 (Standard)
  business_value: "Critical" # Critical | High | Medium | Low
  effort_estimate: "M" # S (1-2 sprints) | M (3-6 sprints) | L (7-12 sprints) | XL (>12 sprints)
  target_quarter: "Q2 2026" # Q1 2026 | Q2 2026 | Q3 2026 | Q4 2026
  sponsor: "CTO" # Executive sponsor
  budget_approved: true # true | false
  strategic_alignment: "Core Business" # Core Business | Innovation | Compliance | Technical Debt

state:
  currentPhase: 0 # 0-8 (SDLC phase number)
  currentGate: "G0" # G0 | G1 | G2 | G3 | G4 | G5 | G6 | G7
  overallProgress: 0.00 # 0.00-1.00 (percentage as decimal)
  health: "Green" # Green | Yellow | Red
  blockers: [] # Array of current blockers
  risks: [] # Array of identified risks

timeline:
  started: "2026-03-17" # ISO date
  planned_completion: "2026-06-30" # ISO date
  actual_completion: null # null | ISO date
  days_behind_schedule: 0 # Positive = behind, negative = ahead
  milestones:
    - name: "Gate 0 - Intake"
      planned: "2026-03-17"
      actual: null
    - name: "Gate 1 - PRD Approved"
      planned: "2026-04-01"
      actual: null
    - name: "Gate 2 - Requirements Complete"
      planned: "2026-04-15"
      actual: null

team:
  pme: "Name Surname" # Project Manager
  po: "Name Surname" # Product Owner
  tl: "Name Surname" # Technical Lead
  dev_count: 3 # Number of developers
  qa_lead: "Name Surname" # QA Lead
  security_lead: "Name Surname" # Security Lead (if dedicated)
  devops: "Name Surname" # DevOps Engineer
  sm: "Name Surname" # Scrum Master

implementation:
  # Standardized folder structure for all projects
  folder: "docs/projects/{project-id}/implementation/"

  epics:
    - id: "EPIC-001"
      title: "Core Implementation"
      status: "planning" # planning | in_progress | completed | blocked | cancelled
      priority: "P1"
      estimation_sp: 50 # Story points
      external_refs:
        jira: "PROJ-123"
        linear: "LIN-456"
        notion: "page-id"

  stories:
    - id: "US-{PROJ}-{NNN}"
      title: "User Story Title"
      status: "ready" # ready | in_progress | in_review | done | blocked
      sprint: "Sprint 2026-12"
      assignee: "dev-name"
      estimation: 8 # Hours or story points
      branch: "feat/PROJ-123-feature-name"
      pr: "https://github.com/org/repo/pull/456"
      external_refs:
        jira: "PROJ-124"
        linear: "LIN-457"
        notion: "story-page-id"

  tasks:
    - id: "TASK-{PROJ}-{NNN}"
      title: "Technical Task"
      type: "dev" # dev | qa | security | devops | docs
      status: "todo" # todo | in_progress | done | blocked
      owner: "role-name"
      estimation: 4 # Hours
      depends_on: [] # Array of task IDs

  handoffs:
    dev_to_qa: "docs/projects/{project-id}/implementation/handoffs/dev-to-qa/"
    qa_to_security: "docs/projects/{project-id}/implementation/handoffs/qa-to-security/"
    security_to_devops: "docs/projects/{project-id}/implementation/handoffs/security-to-devops/"

metrics:
  velocity: 0 # Average story points per sprint
  quality:
    bugs_found: 0
    bugs_fixed: 0
    code_coverage: 0.00 # 0.00-1.00
    security_score: 0.00 # 0.00-1.00
    technical_debt_ratio: 0.00 # 0.00-1.00
  performance:
    build_time_minutes: 0
    test_execution_time_minutes: 0
    deployment_time_minutes: 0
  gates:
    g0_passed: null # null | ISO timestamp
    g1_passed: null
    g2_passed: null
    g3_passed: null
    g4_passed: null
    g5_passed: null
    g6_passed: null
    g7_passed: null

risks:
  - id: "RISK-001"
    description: "Dependency on external API"
    category: "Technical" # Technical | Resource | Business | External
    probability: 0.30 # 0.00-1.00
    impact: 0.80 # 0.00-1.00
    risk_score: 0.24 # probability × impact
    mitigation: "Implement fallback mechanism"
    owner: "Tech Lead"
    status: "active" # active | mitigated | accepted | closed
    created: "2026-03-17"
    target_resolution: "2026-04-01"

dependencies:
  internal:
    - project_id: "PROJ-2026-001"
      description: "Requires authentication service"
      type: "blocks" # blocks | blocked_by
      status: "active" # active | resolved
  external:
    - vendor: "External API Provider"
      description: "API availability required"
      type: "service" # service | library | platform
      status: "active"

external_sync:
  jira:
    project_key: "PROJ"
    epic_id: "PROJ-123"
    last_sync: null # null | ISO timestamp
    sync_enabled: true
    sync_frequency: "daily" # daily | weekly | manual
  linear:
    team_id: "team-abc"
    project_id: "proj-def"
    last_sync: null
    sync_enabled: false
  notion:
    database_id: "abc123"
    page_id: "def456"
    last_sync: null
    sync_enabled: false

automation:
  ci_cd_health: "green" # green | yellow | red
  test_automation_coverage: 0.00 # 0.00-1.00
  deployment_frequency: "0/week" # X/week or X/month
  lead_time_days: 0.0 # Average lead time in days
  mttr_hours: 0.0 # Mean time to recovery in hours
  change_failure_rate: 0.00 # 0.00-1.00

# System metadata (auto-managed)
system:
  created: "2026-03-17T10:30:00Z"
  created_by: "/track-sdlc init"
  last_updated: "2026-03-17T10:30:00Z"
  last_updated_by: "/track-sdlc update"
  version: "1.0.0"
  schema_version: "1.0"
  ecosystem_health_at_creation: 95.5

# Validation checksums (auto-calculated)
validation:
  required_fields_complete: false # Auto-calculated
  external_refs_valid: false # Auto-calculated
  dates_consistent: true # Auto-calculated
  metrics_realistic: true # Auto-calculated
  last_validation: null # ISO timestamp
