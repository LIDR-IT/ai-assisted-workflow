  { { INDUSTRY_TIER_1 } }:
    - "{{SENSITIVE_DATA_TYPE}} template"
    - "{{ACCURACY_METRIC}} detection"
    - "{{ONBOARDING_PROCESS}}"
    - "{{PRIMARY_VERIFICATION_METHOD}}"
    - "{{IDENTITY_PROCESS}}"
    - "{{SECURITY_FEATURE}} attack"
    - "{{METRIC_TYPE_1}} rate"
