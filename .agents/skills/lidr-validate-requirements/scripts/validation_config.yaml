# Validation Engine Configuration
# Based on BMAD Method's 13-step validation process

# Domain-specific regulations and compliance frameworks
compliance_frameworks:
  "{{INDUSTRY_TIER_1}}":
    - "GDPR Art. 9 ({{SENSITIVE_DATA_TYPE}} as special category)"
    - "{{TECHNICAL_STANDARD_1}} ({{SECURITY_FEATURE}} Detection)"
    - "{{TECHNICAL_STANDARD_2}} ({{PRIMARY_VERIFICATION_METHOD}} Testing)"
    - "{{REGULATORY_FRAMEWORK}} ({{COMPLIANCE_CODE}})"
    - "{{AUTHENTICATION_STANDARD}} ({{VERIFICATION_TYPE}} Authentication)"

  financial:
    - "PCI DSS (Payment Card Industry)"
    - "SOX (Sarbanes-Oxley Act)"
    - "Basel III (Banking Regulation)"
    - "PSD2 (Payment Services Directive)"

  healthcare:
    - "HIPAA (Health Insurance Portability)"
    - "FDA 21 CFR Part 820 (Medical Devices)"
    - "ISO 13485 (Medical Devices QMS)"
    - "IEC 62304 (Medical Device Software)"

  automotive:
    - "ISO 26262 (Functional Safety)"
    - "ASPICE (Automotive SPICE)"
    - "UN-R155 (Cybersecurity)"
    - "UN-R156 (Software Update)"

# Quality thresholds for validation steps
quality_thresholds:
  format_detection:
    min_sections: 3
    required_frontmatter: ["id", "version", "last_updated", "status"]

  density_validation:
    min_words_per_section: 50
    max_words_per_section: 1000
    min_total_words: 200

  measurability:
    quantifiable_percentage: 70 # 70% of requirements should be quantifiable
    measurable_keywords:
      [
        "shall",
        "must",
        "should",
        "within",
        "less than",
        "greater than",
        "exactly",
        "at least",
        "at most",
      ]

  traceability:
    min_trace_percentage: 80 # 80% of items should be traceable
    trace_keywords: ["REQ-", "UC-", "TEST-", "BRD-", "JIRA-", "PROJ-"]

  consistency:
    terminology_variance_threshold: 10 # Max 10% variance in key terms

  completeness:
    required_sections_percentage: 90 # 90% of expected sections must be present

  domain_compliance:
    min_compliance_coverage: 80 # 80% of domain regulations should be addressed

  stakeholder_coverage:
    min_stakeholder_percentage: 70 # 70% of expected stakeholders should be mentioned

  testability:
    testable_percentage: 85 # 85% of requirements should be testable
    test_keywords: ["verify", "validate", "test", "check", "confirm", "ensure"]

  acceptance_criteria:
    bdd_format_percentage: 80 # 80% should follow Given/When/Then format
    bdd_keywords: ["Given", "When", "Then", "And", "But"]

# Document type templates
document_templates:
  prd_functional:
    required_sections:
      - "Business Context"
      - "User Personas"
      - "Functional Requirements"
      - "User Stories"
      - "Acceptance Criteria"
      - "Constraints"
    optional_sections:
      - "Assumptions"
      - "Dependencies"
      - "Risks"

  prd_technical:
    required_sections:
      - "Technical Architecture"
      - "System Requirements"
      - "Technical Constraints"
      - "Security Requirements"
      - "Performance Requirements"
      - "Integration Points"
    optional_sections:
      - "Deployment Architecture"
      - "Monitoring Strategy"

  requirements_functional:
    required_sections:
      - "Functional Requirements"
      - "Business Rules"
      - "Data Requirements"
      - "User Interface Requirements"
    optional_sections:
      - "Workflow Requirements"
      - "Integration Requirements"

  requirements_non_functional:
    required_sections:
      - "Performance Requirements"
      - "Security Requirements"
      - "Availability Requirements"
      - "Scalability Requirements"
      - "Maintainability Requirements"
    optional_sections:
      - "Compliance Requirements"
      - "Compatibility Requirements"

  epic_breakdown:
    required_sections:
      - "Epic Overview"
      - "Sub-Epics"
      - "Acceptance Criteria"
      - "Dependencies"
    optional_sections:
      - "Assumptions"
      - "Risks"

  user_stories:
    required_sections:
      - "User Stories"
      - "Acceptance Criteria"
      - "Definition of Done"
    optional_sections:
      - "Dependencies"
      - "Assumptions"

# Validation step weights (for overall scoring)
step_weights:
  format_detection: 0.10
  density_validation: 0.08
  measurability: 0.12
  traceability: 0.10
  consistency: 0.08
  completeness: 0.12
  domain_compliance: 0.10
  stakeholder_coverage: 0.08
  testability: 0.10
  acceptance_criteria: 0.12

# Quality rating scale
quality_ratings:
  excellent:
    min_score: 90
    description: "Excellent - Production ready"
  good:
    min_score: 75
    description: "Good - Minor improvements needed"
  satisfactory:
    min_score: 60
    description: "Satisfactory - Some improvements required"
  needs_improvement:
    min_score: 40
    description: "Needs Improvement - Significant work required"
  poor:
    min_score: 0
    description: "Poor - Major overhaul needed"

