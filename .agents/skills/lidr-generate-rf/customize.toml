# lidr-generate-rf — workflow customization (BMad-style, read directly by the orchestrator)
# The orchestrator (SKILL.md) reads this for paths + state. Overrides are merged by the
# active client config when present. No external resolver needed — the agent reads it.

[workflow]
# State machine for every run (mirrors bmad-prd status:draft→final + resume-on-activation).
states = ["draft", "in-progress", "final"]
state_field = "status" # frontmatter key on the produced artifact
resume_on_activation = true # scan for prior runs whose status != final, offer to resume

# The three parallel modes (intents). The orchestrator detects the mode and routes to its workflow.
[workflow.modes.per-rf]
workflow = "workflows/per-rf.md"
output = "docs/projects/{CLIENT_CODE}/requirements/RF-{PROJ}-{NNN}.md" # one file per RF (Gate-2 contract)
companion = "docs/projects/{CLIENT_CODE}/requirements/dependency-map.md"
gate = "G2"

[workflow.modes.living-spec]
workflow = "workflows/living-spec.md"
output = "docs/features/{feature}/spec.md" # consolidated UJ/RF/NFR/AC (current-state)
per_client = "docs/projects/{CLIENT_CODE}/features/{feature}/spec.md"

[workflow.modes.brownfield-audit]
workflow = "workflows/brownfield-audit.md"
output = "docs/features/{feature}/spec.md" # recovered from code, then handed to bmad-testarch-trace
inputs = ["bmad-document-project"] # deep-dives + docs/index.md
handoff = "bmad-testarch-trace" # coverage audit + gate

[workflow.shared]
# Persistent context every mode loads first (mirrors bmad persistent_facts).
persistent_facts = [
  "file:rules/lidr-sdlc/project.md", # active client, glossary, team
  "file:rules/lidr-sdlc/tech-stack.md", # conventions
]
# Per-run audit trail (mirrors bmad .decision-log.md). Lives at the run/output root.
decision_log = ".decision-log.md"
# References the workflows pull in on demand (keeps SKILL.md lean).
references = [
  "references/decomposition-rules.md",
  "references/bdd-rules.md",
  "templates/rf-format.md",
  "templates/rf-body.md",
  "checklists/rf-coherence.md",
]
# Output language follows the client `language` setting (default en).
language = "client" # resolve via _shared/lidr/integrations/
