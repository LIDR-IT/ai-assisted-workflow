description = "Centralized SDLC tracking with sdlc-tracking.yaml management"

prompt = """

<!--
COMMAND: track-sdlc
VERSION: 1.0.0
AUTHOR: SDLC Enhancement Team
LAST UPDATED: 2026-03-17

PURPOSE:
Centralized SDLC tracking system for the 500-project PME portfolio.
Creates, updates, and synchronizes sdlc-tracking.yaml files with external tools.
Provides real-time project health monitoring and portfolio analytics.

USAGE:
  /track-sdlc project-alpha init        -> Initialize tracking for new project
  /track-sdlc project-alpha update     -> Update current state
  /track-sdlc project-alpha sync       -> Sync with external tools
  /track-sdlc project-alpha health     -> Generate health report
  /track-sdlc portfolio dashboard      -> PME portfolio dashboard

ARGUMENTS:
  project-id: Project identifier (required for project operations)
  action: init | update | sync | health | dashboard

REQUIREMENTS:
  - .claude/rules/ configured
  - Project documented in docs/projects/{project-id}/
  - External tool credentials (optional, degrades gracefully)

RELATED COMMANDS:
  /advance-gate     - Updates gate status in tracking
  /implement-ticket - Updates story progress in tracking
  /sprint-health    - Reads from tracking for health metrics

OUTPUT:
  - sdlc-tracking.yaml in project root
  - Implementation folder structure
  - Health reports and analytics

CHANGELOG:
  v1.0.0 (2026-03-17): Initial release - Phase 2 enhancement
-->

# Track SDLC $1 $2

Load context from rules FIRST:

- @../rules/org.md -> organizational standards, roles, portfolio structure
- @../rules/project.md -> current project context
- @../rules/workflows.md -> role permissions

## Step 1: Validate Arguments

If "$1" is empty:
ERROR: Project ID required.
Usage: /track-sdlc [project-id] [action]
Actions: init | update | sync | health | dashboard

If "$1" == "portfolio" and "$2" == "dashboard":
→ Jump to Step 8 (Portfolio Dashboard)

Valid actions: init, update, sync, health
If "$2" is not one of these:
ERROR: Invalid action. Use: init | update | sync | health

## Step 2: Verify Project Exists

Check if project directory exists: `docs/projects/$1/`

If not found AND action != "init":
ERROR: Project $1 not found in docs/projects/
Run: /track-sdlc $1 init

If action == "init" AND directory exists:
WARNING: Project $1 already exists.

Use AskUserQuestion:

- question: "Project already exists. Reinitialize or update?"
- header: "Action"
- options:
  - Reinitialize (overwrite sdlc-tracking.yaml)
  - Update (preserve existing data)
  - Cancel

## Step 3: Action - Initialize Project Tracking

If action == "init":

### 3a: Gather Project Information

Use AskUserQuestion for project details:

- question: "Project type?"
- options:
  - Enhancement
  - New Feature
  - Bug Fix
  - Technical Debt
  - Infrastructure

Use AskUserQuestion for business priority:

- question: "PME priority level?"
- options:
  - P1 (Critical business impact)
  - P2 (High business value)
  - P3 (Standard priority)

Use AskUserQuestion for effort estimate:

- question: "Effort estimate?"
- options:
  - S (1-2 sprints)
  - M (3-6 sprints)
  - L (7-12 sprints)
  - XL (>12 sprints)

### 3b: Create sdlc-tracking.yaml

Generate sdlc-tracking.yaml from template:

yaml
# SDLC Tracking Configuration - Central Source of Truth
project:
  id: "$1"
  name: "[USER INPUT: Project name]"
  type: "[USER SELECTION]"
  domain: "Biometric Authentication" # Default from project.md

portfolio:
  pme_priority: "[USER SELECTION]"
  business_value: "[DERIVED FROM PRIORITY]"
  effort_estimate: "[USER SELECTION]"
  target_quarter: "[CALCULATED FROM CURRENT DATE]"

state:
  currentPhase: 0
  currentGate: "G0"
  overallProgress: 0.00
  health: "Green"

timeline:
  started: "[TODAY]"
  planned_completion: "[CALCULATED FROM EFFORT]"
  actual_completion: null
  days_behind_schedule: 0

team:
  pme: "[FROM project.md CONTEXT]"
  po: "[FROM project.md CONTEXT]"
  tl: "[FROM project.md CONTEXT]"
  dev_count: 3 # Default
  qa_lead: "[FROM project.md CONTEXT]"

implementation:
  folder: "docs/projects/$1/implementation/"
  epics: []
  stories: []
  tasks: []
  handoffs:
    dev_to_qa: "docs/projects/$1/implementation/handoffs/dev-to-qa/"
    qa_to_security: "docs/projects/$1/implementation/handoffs/qa-to-security/"
    security_to_devops: "docs/projects/$1/implementation/handoffs/security-to-devops/"

metrics:
  velocity: 0
  quality:
    bugs_found: 0
    bugs_fixed: 0
    code_coverage: 0
    security_score: 0
  gates:
    g0_passed: null
    g1_passed: null
    g2_passed: null
    g3_passed: null
    g4_passed: null
    g5_passed: null
    g6_passed: null
    g7_passed: null

risks: []

external_sync:
  jira:
    project_key: "[DERIVED FROM PROJECT-ID]"
    epic_id: null
    last_sync: null
  linear:
    team_id: null
    project_id: null
    last_sync: null
  notion:
    database_id: null
    page_id: null
    last_sync: null

automation:
  ci_cd_health: "green"
  test_automation_coverage: 0
  deployment_frequency: "0/week"
  lead_time_days: 0
  mttr_hours: 0


### 3c: Create Implementation Folder Structure

Create standardized folder structure:

[Code block:]
mkdir -p "docs/projects/$1/implementation/epics"
mkdir -p "docs/projects/$1/implementation/stories"
mkdir -p "docs/projects/$1/implementation/tasks"
mkdir -p "docs/projects/$1/implementation/handoffs/dev-to-qa"
mkdir -p "docs/projects/$1/implementation/handoffs/qa-to-security"
mkdir -p "docs/projects/$1/implementation/handoffs/security-to-devops"


Create README in implementation folder:

markdown
# Implementation Tracking - $1

This folder contains the standardized implementation tracking structure:

- `epics/` - Epic definitions with external references
- `stories/` - User stories with rich frontmatter and development tracking
- `tasks/` - Technical tasks by type (dev/qa/security/devops/docs)
- `handoffs/` - Automated handoff generation between phases

## Integration

- **Main tracking**: `../../sdlc-tracking.yaml`
- **External tools**: Jira, Linear, Notion (bidirectional sync)
- **Commands**: `/implement-ticket`, `/advance-gate`, `/track-sdlc`
- **Automation**: CI/CD pipeline updates, automated handoffs

Generated by: `/track-sdlc $1 init`
Date: [TODAY]


SUCCESS: Project $1 initialized with SDLC tracking.

## Step 4: Action - Update Project State

If action == "update":

### 4a: Load Current Tracking

Read current `sdlc-tracking.yaml` from project root.

If not found:
ERROR: No tracking file found. Run: /track-sdlc $1 init

### 4b: Detect Changes Since Last Update

Scan implementation folder for changes:

- New epics in `epics/` folder
- New stories in `stories/` folder
- Updated story status from frontmatter
- New tasks in `tasks/` folder
- Git branch/PR updates
- Handoff documents generated

### 4c: Calculate Progress Metrics

javascript
// Automatic progress calculation
const totalStories = stories.length;
const completedStories = stories.filter((s) => s.status === "done").length;
const overallProgress = completedStories / totalStories;

const avgVelocity = calculateVelocityFromSprints();
const daysGehindSchedule = calculateScheduleVariance();


### 4d: Update Health Status

javascript
// Health status algorithm
let health = "Green";

if (daysGehindSchedule > 10 || openCriticalBugs > 0) {
  health = "Red";
} else if (daysGehindSchedule > 5 || velocity < 0.8 * avgVelocity) {
  health = "Yellow";
}


### 4e: Persist Updates

Update sdlc-tracking.yaml with new state and metrics.

SUCCESS: Project $1 updated. Health: [COLOR]. Progress: [XX]%.

## Step 5: Action - Sync External Tools

If action == "sync":

### 5a: Validate External Connections

Check connectivity to configured external tools:

- Jira: Test API connection with project_key
- Linear: Test API connection with team_id
- Notion: Test database access with database_id

### 5b: Bidirectional Synchronization

**From External → Tracking:**

- Pull epic/story status updates from Jira/Linear
- Pull sprint assignments and velocity metrics
- Pull bug counts and resolution data
- Update tracking YAML with external data

**From Tracking → External:**

- Push progress updates to external systems
- Create missing epics/stories in external tools
- Update status and assignments
- Add comments with tracking health metrics

### 5c: Conflict Resolution

If external data conflicts with tracking data:

- Timestamp-based resolution (most recent wins)
- Manual review for critical conflicts
- Log all conflicts for review

### 5d: Update Sync Timestamps

Update `external_sync.last_sync` for each successfully synced tool.

SUCCESS: External sync completed. [N] tools synced, [M] conflicts resolved.

## Step 6: Action - Health Report

If action == "health":

Generate comprehensive project health report:

markdown
# Project Health Report - $1

Generated: [TIMESTAMP]

## Executive Summary

- **Health**: [COLOR] [HEALTH_SCORE]/100
- **Progress**: [XX]% complete ([Y] of [Z] stories done)
- **Schedule**: [ON TRACK / X days behind]
- **Quality**: [QUALITY_SCORE]/100

## Phase Progress

- Current Phase: [N] ([PHASE_NAME])
- Current Gate: [GN] - [STATUS]
- Next Milestone: [DATE] ([DESCRIPTION])

## Metrics Dashboard

| Metric         | Current       | Target        | Trend   |
| -------------- | ------------- | ------------- | ------- |
| Velocity       | [X] sp/sprint | [Y] sp/sprint | [TREND] |
| Code Coverage  | [X]%          | 80%           | [TREND] |
| Security Score | [X]%          | 95%           | [TREND] |
| Bug Count      | [X]           | 0             | [TREND] |

## Risk Assessment

[LIST OF ACTIVE RISKS WITH PROBABILITY × IMPACT]

## Recent Activity

[LAST 5 SIGNIFICANT UPDATES]

## Recommendations

[AUTOMATED RECOMMENDATIONS BASED ON METRICS]


SUCCESS: Health report generated for project $1.

## Step 7: Validation and Quality Checks

For all actions, run validation checks:

### 7a: Ecosystem Health Integration

[Code block:]
# Import ecosystem validation
import { validateEcosystemHealth } from '../_shared/validators/ecosystem-validation.js';

# Check ecosystem health
const ecosystemHealth = await validateEcosystemHealth();
if (ecosystemHealth.overallHealth < 70) {
  WARNING: Ecosystem health low ([XX]%). Consider running ecosystem sync.
}


### 7b: Tracking File Validation

Validate sdlc-tracking.yaml structure:

- All required fields present
- Valid enums for status fields
- Consistent date formats
- Valid external references

### 7c: Implementation Folder Integrity

Verify folder structure integrity:

- All required folders exist
- No orphaned files
- Frontmatter consistency in story files
- Valid external reference mappings

## Step 8: Portfolio Dashboard

If "$1" == "portfolio" and "$2" == "dashboard":

### 8a: Scan All Projects

Scan all `docs/projects/*/sdlc-tracking.yaml` files.

### 8b: Aggregate Analytics

javascript
const portfolioAnalytics = {
  overview: {
    totalProjects: allProjects.length,
    activeProjects: allProjects.filter((p) => p.state.health !== "Completed").length,
    projectsOnTrack: allProjects.filter((p) => p.state.health === "Green").length,
    projectsAtRisk: allProjects.filter((p) => p.state.health === "Yellow").length,
    projectsBlocked: allProjects.filter((p) => p.state.health === "Red").length,
  },

  phaseDistribution: calculatePhaseDistribution(allProjects),
  velocityTrends: calculateVelocityTrends(allProjects),
  riskHeatMap: generateRiskHeatMap(allProjects),
  resourceUtilization: calculateResourceUtilization(allProjects),
};


### 8c: Generate Portfolio Dashboard

Create comprehensive portfolio dashboard:

markdown
# PME Portfolio Dashboard

Generated: [TIMESTAMP]
Coverage: [N] projects tracked

## Portfolio Health Overview

- **Total Projects**: [N]
- **Active Projects**: [N] ([XX]% of total)
- **Projects On Track**: [N] ([XX]% green health)
- **Projects At Risk**: [N] ([XX]% yellow health)
- **Projects Blocked**: [N] ([XX]% red health)

## Phase Distribution

