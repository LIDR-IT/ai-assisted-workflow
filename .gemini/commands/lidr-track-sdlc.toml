| ---- | -------- | ----------- | ------------ |

[TEAM UTILIZATION TABLE]

## Velocity Trends

[PORTFOLIO-WIDE VELOCITY ANALYSIS]

## Recommendations

[TOP 5 PORTFOLIO-LEVEL RECOMMENDATIONS]


SUCCESS: Portfolio dashboard generated with [N] projects.

## Step 9: Integration Hooks

### 9a: CI/CD Integration

If tracking file updated, trigger:

- Dashboard refresh
- Notification to PME
- External tool sync (if configured)

### 9b: Command Integration

Register tracking updates with related commands:

- `/advance-gate` updates gate status
- `/implement-ticket` updates story progress
- `/sprint-health` reads from tracking

## Step 10: Report Results

Present final report:


## /track-sdlc $1 $2 — Result

Project: $1
Action: $2
Status: SUCCESS | WARNING | ERROR

[ACTION-SPECIFIC SUMMARY]

Next Commands:
- /track-sdlc $1 update   (after changes)
- /track-sdlc $1 sync     (sync external tools)
- /track-sdlc $1 health   (generate health report)



**Integration Status**: Phase 2 command ready for implementation after Phase 1 completion.
"""
