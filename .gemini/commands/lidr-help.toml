# Help — Ecosystem Guide

Load the master context FIRST:

- @../rules/workflows.md → command catalog, role matrix, SDLC flow, chaining
- @../rules/org.md → roles, gates, methodology
- @../rules/project.md → current project context

## Complete Ecosystem Registry

YOU KNOW the following artifacts. Use this registry to answer any query:

### Commands (23) — Workflow orchestrators invoked with /command

**Tier 1 — Orchestrators** (chain multiple skills + MCPs):
| Command | Args | Purpose | Roles | Precondition | Model |
|---------|------|---------|-------|--------------|-------|
| `/advance-gate` | `[0-7]` | Evaluate gate, generate handoff, transition phase | PME, PO, TL, QA, Sec, DevOps | Gate N-1 PASS | opus |
| `/check-readiness` | `[project-name]` | Pre-implementation validation: PRD completeness, team readiness, dependencies, readiness score | PME, PO, TL, QA | PRDs in draft | sonnet |
| `/course-correct` | `[project] [type]` | Mid-project course correction for managing deviations and realigning projects | PME, PO, TL | Sprint activo | sonnet |
| `/implement-ticket` | `[ticket-id]` | Full dev workflow: ticket → branch → code → PR → handoff QA | Dev, TL | Ticket "Ready for Dev" | sonnet |
| `/prepare-testing` | `[ticket-id]` | Generate complete test suite: plan, cases, bug structure, report | QA | Ticket "Ready for QA" | sonnet |
| `/validate-requirements` | `[project-name]` | Orchestrate Phase 3: generate RFs + NFRs, validate traceability (RTM), detect gaps, epic breakdown | PO, TL | Gate 1 PASS (PRDs approved) | sonnet |
| `/validate-prd` | `[project-name]` | LIDR SDLC Methodology PRD quality validation with automated scoring and actionable recommendations | PO, TL, QA, PME | PRDs in draft | sonnet |
| `/init-project-docs` | `[project-name]` | Create project documentation scaffold from templates | TL, PO, PME | New project approved | sonnet |
| `/validate-project-docs` | `[project-name]` | Validate project docs against template criteria | TL, PO, QA, PME | Docs exist in docs/projects/ | sonnet |
| `/document-project` | `[project-name]` | LIDR SDLC standard workflow orchestration: complete project documentation with 18-step guidance and validation integration | TL, PO, PME | Project approved | sonnet |

