| Command | Args | Purpose | Roles | Precondition | Model |
|---------|------|---------|-------|--------------|-------|
| `/create-branch` | `[ticket-id]` | Create feature branch with auto naming from Jira | Dev, TL | Ticket assigned | haiku |
