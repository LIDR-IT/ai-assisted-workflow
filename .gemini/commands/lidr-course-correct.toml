## Step 8: Integration with Existing Skills

**Update project documentation:**
If project docs exist at `docs/projects/$1.md`:
- Add course correction reference to project status
- Update risk log if risk-log outputs exist
- Update project timeline/milestones if changed

**Generate follow-up skill recommendations:**
Based on correction strategy chosen:
- If scope changed: "Run /validate-requirements to update RFs"
- If timeline changed: "Run sprint-capacity skill to recalculate"
- If quality issues: "Run tech-debt skill to prioritize improvements"
- If budget changed: "Update business case with new projections"

**Create retrospective integration:**
Add findings to next retrospective agenda as dedicated discussion item.

## Step 9: Immediate Actions and Escalation

**Based on urgency level from Step 1:**

### High Urgency Actions:
- Send course correction report to stakeholders within 2 hours
- Schedule alignment session within 24 hours
- Create Jira/project management tickets for immediate action items
- Notify sponsor/CTO of critical project risk

### Medium Urgency Actions:
- Send course correction report within 1 business day
- Schedule alignment session within 1 week
- Create action items for next sprint planning
- Add to PME project portfolio review

**Escalation triggers:**
- Budget variance >25%: Automatic sponsor notification
- Timeline delay >6 weeks: CTO notification required
- Quality score <60%: Technical review committee escalation
- Multiple drift types detected: Executive committee review

## Step 10: Success Metrics and ROI Tracking

**Define success metrics for this course correction:**
- **Drift reduction:** Target reduction in variance within 2 sprints
- **Stakeholder satisfaction:** Alignment session success rating >4/5
- **Velocity recovery:** Return to planned velocity within 3 sprints
- **Quality recovery:** Defect rate <5% within 2 sprints

**ROI calculation:**
- **Cost of course correction:** [hours spent on analysis + alignment session]
- **Cost of no action:** [projected overrun/failure cost]
- **ROI ratio:** [prevented cost / correction cost]

**Add to automation success tracking:**
Log this course correction execution for ROI analysis and pattern recognition to improve future automated drift detection.

