description = "Mid-project course correction for managing deviations and realigning projects"

prompt = """

<!--
COMMAND: course-correct
VERSION: 1.0.0
AUTHOR: SDLC Team
LAST UPDATED: 2026-03-15

PURPOSE:
Mid-project course correction orchestrator following LIDR SDLC course-correction pattern.
Detects project drift (scope, timeline, budget, quality) and guides realignment with
stakeholder involvement. 60% automation level targeting 120+ hours/year ROI.

USAGE:
  /course-correct {{CLIENT_CODE}}-sdk scope        -> Scope drift correction
  /course-correct mobile-app timeline     -> Timeline realignment
  /course-correct identity-platform quality -> Quality degradation recovery
  /course-correct domain-specific-api full      -> Comprehensive review

ARGUMENTS:
  project-name: Project identifier (required)
  correction-type: scope | timeline | budget | quality | full (optional, defaults to 'full')

CORRECTION TYPES:
  scope     = Scope creep/reduction detection and management
  timeline  = Schedule deviation analysis and recovery planning
  budget    = Resource allocation realignment
  quality   = Technical debt and quality degradation recovery
  full      = Comprehensive 360° project health assessment

REQUIREMENTS:
  - .claude/rules/ configured (org.md, project.md, workflows.md)
  - Current sprint data accessible via Jira/tools
  - Previous retrospective and risk-log data available
  - Stakeholder contact information in project documentation

RELATED SKILLS:
  retrospective - For data-driven analysis foundation
  risk-log      - For risk reassessment and mitigation updates
  epic-review   - For scope and delivery analysis

OUTPUT TEMPLATE:
  command-specific output (no template needed) (new template)

AUTOMATION LEVEL: 60%
- Automated: Data collection, drift detection, pattern analysis
- Human: Stakeholder decisions, priority changes, resource reallocation

ROI TARGET: 120+ hours/year
- Prevents project failures through early intervention
- Reduces emergency firefighting with proactive corrections
- Standardizes course correction across portfolio

CHANGELOG:
  v1.0.0 (2026-03-15): Initial release - LIDR SDLC pattern implementation
-->

# Course Correction for Project $1

Load context from rules FIRST:
- @../rules/org.md -> organizational standards, escalation paths, change management
- @../rules/project.md -> current project context, team, roadmap
- @../rules/workflows.md -> role permissions, stakeholder communication
- @../rules/documentation.md -> documentation update requirements

## Step 1: Validate Input and Authorization

**Validate project name:**
If "$1" is empty or invalid:
  ERROR: Project name required.
  Usage: /course-correct [project-name] [scope|timeline|budget|quality|full]
  Exit.

**Determine correction type:**
If "$2" is empty: set correction_type = "full"
Else: set correction_type = "$2"

Valid correction types: scope, timeline, budget, quality, full
If invalid type provided:
  ERROR: Invalid correction type. Must be: scope | timeline | budget | quality | full
  Exit.

**Verify role authorization:**
Check @../rules/workflows.md for authorized roles.
Authorized roles for /course-correct: PME, PO, Tech Lead.

Use AskUserQuestion to confirm role and urgency:
- question: "¿Cuál es tu rol y el nivel de urgencia de esta corrección de curso?"
- header: "Autorización y Contexto"
- options:
  - PME - Urgencia Alta (Riesgo de fallo del proyecto)
  - PME - Urgencia Media (Deriva significativa detectada)
  - PO - Urgencia Alta (Scope creep crítico)
  - PO - Urgencia Media (Realineación de prioridades)
  - Tech Lead - Urgencia Alta (Deuda técnica crítica)
  - Tech Lead - Urgencia Media (Calidad en degradación)

If role not authorized -> "Solo PME, PO y Tech Lead pueden ejecutar /course-correct." Exit.

## Step 2: Drift Detection and Analysis

**Load current project state:**
- Read project documentation: `docs/projects/$1.md` (if exists)
- Read latest retrospective: search for most recent retrospective output
- Read current risk log: search for most recent risk-log output
- Read current sprint status from team tools/Jira (if available)

**Automated drift detection based on correction type:**

### If correction_type = "scope" OR "full":
**Scope Drift Analysis:**
- Compare current epic/user stories against original project scope (from business case)
- Count: total_stories_original vs total_stories_current
- Analyze: stories added without formal change request
- Calculate scope_creep_percentage = ((current - original) / original) * 100
- Flag: stories >40h that weren't in original scope
- Red flags: >20% scope increase, unplanned integrations, new technical requirements

**Evidence to collect:**
- Original business case scope section
- Current sprint backlog and epic breakdown
- Change requests (approved vs unapproved scope additions)
- Resource allocation changes

### If correction_type = "timeline" OR "full":
**Timeline Drift Analysis:**
- Compare original project timeline vs current trajectory
- Calculate: planned_completion vs projected_completion (based on current velocity)
- Analyze: sprints with <80% completion, work carryover trends
- Calculate velocity_variance = current_velocity / planned_velocity
- Red flags: >30% timeline overrun, multiple sprint goal failures, blocked dependencies

**Evidence to collect:**
- Original project timeline/milestones
- Sprint velocity over last 3+ sprints
- Outstanding dependencies and blockers
- Resource availability changes (vacation, sick leave, departures)

### If correction_type = "budget" OR "full":
**Budget/Resource Drift Analysis:**
- Compare planned vs actual resource allocation
- Analyze: overtime trends, external vendor costs, tool/license additions
- Calculate: budget_variance_percentage = ((actual - planned) / planned) * 100
- Red flags: >15% budget overrun, unplanned tool purchases, consultant time

**Evidence to collect:**
- Original budget allocation by sprint/phase
- Actual time tracking data
- Vendor/tool cost increases
- Team capacity changes (additions, departures)

### If correction_type = "quality" OR "full":
**Quality Drift Analysis:**
- Analyze technical debt trends from latest retrospectives
- Review: bug escape rate, test coverage degradation, code quality metrics
- Calculate: quality_degradation_score based on multiple factors
- Red flags: increasing bug counts, test coverage <80%, performance regressions

**Evidence to collect:**
- Recent bug reports and escape rates
- Code quality metrics (SonarQube, linting results)
- Test coverage trends
- Performance metrics and user feedback

## Step 3: Stakeholder Impact Assessment

**Identify affected stakeholders based on drift type:**

Use AskUserQuestion to gather stakeholder context:
- question: "¿Quiénes son los stakeholders principales afectados por esta deriva?"
- header: "Identificación de Stakeholders"
- options:
  - Sponsor/CTO (budget/timeline impact)
  - Product Manager (scope/feature impact)
  - Engineering Team (quality/technical impact)
  - QA Team (quality/testing impact)
  - Customer Success (user impact)
  - Legal/Compliance (regulatory impact)
  - All of the above (comprehensive impact)

**For each identified stakeholder:**
- Document their primary concern (scope, timeline, budget, quality)
- Assess impact level: High, Medium, Low
- Determine communication urgency: Immediate, This Sprint, This Week

## Step 4: Root Cause Analysis

**Automated pattern analysis:**
Based on the drift type and evidence collected, analyze common root causes:

### Scope Drift Root Causes:
- Unclear initial requirements (check: PRD quality, stakeholder alignment)
- Customer feedback incorporation without change control
- Technical discovery revealing new requirements
- Competitive pressure driving feature additions
- Stakeholder authority confusion (multiple decision makers)

### Timeline Drift Root Causes:
- Underestimated complexity (check: original estimates vs reality)
- Team capacity overestimation (planned vs actual availability)
- External dependencies delays (vendor, legal, compliance)
- Technical challenges/refactoring needs
- Quality issues requiring rework

### Budget Drift Root Causes:
- Scope creep without budget adjustment
- Resource cost increases (salary, vendor rates)
- Unplanned tool/infrastructure needs
- Extended timeline requiring more resources
- Expertise gaps requiring consulting

### Quality Drift Root Causes:
- Pressure to deliver faster (check: recent sprint commitments)
- Technical debt accumulation
- Testing shortcuts
- Team knowledge gaps
- Insufficient code review rigor

**Generate root cause hypothesis:**
Based on the evidence and patterns, generate 2-3 most likely root causes with supporting evidence.

## Step 5: Correction Strategy Development

**For each identified drift, develop correction strategies:**

### Scope Correction Strategies:
- **Freeze scope:** No new features until current sprint completes
- **Prioritize ruthlessly:** Use MoSCoW to cut low-value features
- **Formal change control:** All scope changes require sponsor approval
- **Split project:** Move non-essential features to Phase 2
- **Resource addition:** Add team members (if budget allows)

### Timeline Correction Strategies:
- **Parallel workstreams:** Identify tasks that can be parallelized
- **Scope reduction:** Cut features to meet original timeline
- **Resource reallocation:** Move people from other projects
- **Milestone adjustment:** Negotiate new delivery dates with stakeholders
- **Risk mitigation:** Address blockers aggressively

### Budget Correction Strategies:
- **Scope reduction:** Cut features to fit budget
- **Resource optimization:** Replace expensive resources with internal
- **Tool consolidation:** Eliminate redundant tools/services
- **Timeline acceleration:** Deliver faster to reduce resource costs
- **Budget increase:** Request additional funding with business justification

### Quality Correction Strategies:
- **Technical debt sprint:** Dedicate 1 sprint to debt paydown
- **Testing reinforcement:** Add automated tests, increase coverage
- **Code review rigor:** Implement stricter review standards
- **Refactoring plan:** Systematic improvement of problem areas
- **Quality gates:** Implement stricter DoD/acceptance criteria

## Step 6: Stakeholder Alignment Session Plan

**Generate alignment session plan:**

**Session agenda template:**
1. **Current State Presentation (10 min):** Present drift analysis with data
2. **Root Cause Discussion (15 min):** Review hypotheses, gather input
3. **Strategy Options (20 min):** Present correction strategies with pros/cons
4. **Impact Assessment (10 min):** Discuss business/technical implications
5. **Decision Making (15 min):** Choose strategy and assign owners
6. **Action Planning (10 min):** Define next steps with timeline

**Required attendees based on drift type:**
- Scope: Sponsor, PO, key stakeholders
- Timeline: PME, PO, Tech Lead, Sponsor
- Budget: PME, Sponsor, Finance (if applicable)
- Quality: Tech Lead, QA Lead, Sponsor
- Full: All above stakeholders

**Pre-work for attendees:**
- Send course correction report 24h before meeting
- Include specific questions for each stakeholder role
- Request prepared position on suggested strategies

